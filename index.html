<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadget Hub | Smart Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <div class="max-w-4xl mx-auto py-10 px-4">
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-indigo-100 mb-10">
            <h2 class="text-3xl font-black text-indigo-700 mb-6 flex items-center gap-2">
                🚀 Gadget Hub Admin
            </h2>
            
            <form id="productForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Product Name</label>
                    <input type="text" id="pName" placeholder="e.g. Apple Watch Series 9" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500" required>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Category</label>
                    <select id="pCategory" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500 bg-white font-semibold">
                        <option value="Mobiles">📱 Mobiles</option>
                        <option value="Laptops">💻 Laptops</option>
                        <option value="Audio">🎧 Audio (Earbuds/Speakers)</option>
                        <option value="watches">⌚ watches</option> </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Select Photo</label>
                    <input type="file" id="pImageFile" accept="image/*" class="w-full px-4 py-2 rounded-xl border border-gray-200" required>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Price (₹)</label>
                    <input type="number" id="pPrice" placeholder="24999" class="w-full px-4 py-3 rounded-xl border border-gray-200" required>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Affiliate Link</label>
                    <input type="url" id="pLink" placeholder="https://amzn.to/..." class="w-full px-4 py-3 rounded-xl border border-gray-200" required>
                </div>

                <div class="md:col-span-2">
                    <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl shadow-lg uppercase tracking-widest disabled:bg-gray-400 transition-all">
                        Compress & Upload Product
                    </button>
                </div>
            </form>
        </div>

        <h3 class="text-xl font-bold text-gray-800 mb-4 px-2 uppercase">Live Products</h3>
        <div id="adminProductList" class="grid grid-cols-1 gap-4">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5pKW4Fi6CfQzW58RBoPA5fIL4JIfJoH0",
            authDomain: "gadget-hub-3b6e5.firebaseapp.com",
            projectId:  "gadget-hub-3b6e5",
            appId: "1:393761011089:web:0c6ff49e65d05aa3ca9630"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- IMAGE COMPRESSOR ---
        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600; // Mobile view ke liye 600px kafi hai
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); // 60% quality for extra speed
                    };
                };
            });
        }

        // --- FORM SUBMIT ---
        const form = document.getElementById('productForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const file = document.getElementById('pImageFile').files[0];

            try {
                btn.innerText = "🔄 Compressing...";
                btn.disabled = true;

                const compressedImg = await compressImage(file);

                btn.innerText = "📤 Uploading...";
                await addDoc(collection(db, "products"), {
                    name: document.getElementById('pName').value,
                    category: document.getElementById('pCategory').value,
                    image: compressedImg,
                    link: document.getElementById('pLink').value,
                    price: document.getElementById('pPrice').value,
                    createdAt: serverTimestamp()
                });

                alert("Watch/Gadget added successfully! 🔥");
                form.reset();
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.innerText = "Compress & Upload Product";
                btn.disabled = false;
            }
        });

        // --- FETCH & DELETE ---
        onSnapshot(query(collection(db, "products"), orderBy("createdAt", "desc")), (snap) => {
            const list = document.getElementById('adminProductList');
            list.innerHTML = '';
            snap.forEach(docSnap => {
                const p = docSnap.data();
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border border-gray-100">
                        <div class="flex items-center gap-4">
                            <img src="${p.image}" class="w-14 h-14 object-cover rounded-lg shadow-inner bg-gray-50">
                            <div>
                                <h3 class="font-bold text-gray-800 text-sm leading-tight">${p.name}</h3>
                                <p class="text-xs text-indigo-500 font-semibold">${p.category} • ₹${p.price}</p>
                            </div>
                        </div>
                        <button onclick="deleteProduct('${docSnap.id}')" class="text-red-400 hover:text-red-600 p-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>`;
            });
        });

        window.deleteProduct = async (id) => {
            if(confirm("Delete karna hai?")) await deleteDoc(doc(db, "products", id));
        };
    </script>
</body>
</html>
